<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Login</title>

    <!-- ICONOS REALES -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            background:#f3f7fd;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:25px;
        }

        .login-card{
            width:1120px;
            height:620px;
            background:white;
            border-radius:24px;
            overflow:hidden;
            display:flex;
            box-shadow:
            0 20px 50px rgba(0,0,0,0.12);
        }

        /* PANEL IZQUIERDO */

        .left{
            width:45%;
            background:
            linear-gradient(160deg,#5a3fd8,#4520c2);
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            align-items:center;
            padding:35px 25px;
            color:white;
        }

        .student{
            width:88%;
            height:430px;
            object-fit:contain;
            margin-top:10px;
        }

        .left-footer{
            text-align:center;
            margin-bottom:18px;
        }

        .left-footer h3{
            font-size:19px;
            margin-bottom:8px;
            font-weight:700;
        }

        .left-footer p{
            font-size:14px;
            opacity:.9;
        }

        /* PANEL DERECHO */

        .right{
            width:55%;
            padding:55px 70px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .logo{
            width:220px;
            margin:0 auto 18px;
            display:block;
        }

        .system-title{
            text-align:center;
            font-size:22px;
            font-weight:800;
            color:#0f172a;
            margin-bottom:6px;
        }

        .subtitle{
            text-align:center;
            color:#64748b;
            font-size:14px;
            margin-bottom:30px;
        }

        .login-title{
            text-align:center;
            font-size:30px;
            color:#111827;
            margin-bottom:28px;
            font-weight:700;
        }

        .field{
            margin-bottom:22px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:15px;
            color:#1f2937;
            font-weight:600;
        }

        .input-box{
            position:relative;
        }

        .input-box input{
            width:100%;
            height:52px;
            border:1px solid #d1d5db;
            border-radius:12px;
            padding:0 50px;
            font-size:15px;
            outline:none;
            transition:0.2s;
            background:#f9fbff;
        }

        .input-box input:focus{
            border-color:#2563eb;
            box-shadow:
            0 0 0 4px rgba(37,99,235,0.12);
            background:white;
        }

        .icon{
            position:absolute;
            left:18px;
            top:50%;
            transform:translateY(-50%);
            color:#64748b;
            font-size:17px;
        }

        .eye-btn{
            position:absolute;
            right:12px;
            top:50%;
            transform:translateY(-50%);
            border:none;
            background:#eef2ff;
            width:36px;
            height:36px;
            border-radius:50%;
            cursor:pointer;
            color:#374151;
            transition:0.2s;
        }

        .eye-btn:hover{
            background:#dbeafe;
        }

        .options{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
            font-size:14px;
        }

        .remember{
            display:flex;
            align-items:center;
            gap:7px;
            color:#374151;
        }

        .remember input{
            width:16px;
            height:16px;
        }

        .forgot{
            color:#2563eb;
            text-decoration:none;
            font-size:14px;
            font-weight:600;
        }

        .forgot:hover{
            text-decoration:underline;
        }

        .btn-login{
            width:100%;
            height:52px;
            border:none;
            border-radius:12px;
            background:
            linear-gradient(135deg,#2563eb,#1d4ed8);
            color:white;
            font-size:17px;
            font-weight:700;
            cursor:pointer;
            transition:0.2s;
            box-shadow:
            0 10px 20px rgba(37,99,235,0.25);
        }

        .btn-login:hover{
            transform:translateY(-2px);
        }

        .btn-web{
            width:100%;
            height:48px;
            margin-top:14px;
            border:2px solid #2563eb;
            border-radius:12px;
            background:white;
            color:#2563eb;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s;
        }

        .btn-web:hover{
            background:#eff6ff;
        }

        .line{
            margin:24px 0;
            border-top:1px solid #e5e7eb;
        }

        .footer{
            text-align:center;
            font-size:14px;
            color:#64748b;
        }

        @media(max-width:950px){

            .login-card{
                width:100%;
                height:auto;
            }

            .left{
                display:none;
            }

            .right{
                width:100%;
                padding:40px 28px;
            }

        }

    </style>

</head>

<body>

<div class="login-card">

    <!-- IZQUIERDA -->

    <div class="left">

        <img
        class="student"
        src="https://demo3.academico.pe/admin/uploads_color/1770706232_1763564580_alumna.png"
        alt="Estudiante">

        <div class="left-footer">
            <h3>SISTEMA DE GESTIÓN ACADÉMICA</h3>
            <p>Universidad Peruana Los Andes</p>
        </div>

    </div>

    <!-- DERECHA -->

    <div class="right">

        <img
        class="logo"
        src="https://intranet.upla.edu.pe/Capa_Presentacion/Recursos/logo-upla.gif"
        alt="UPLA">

        <div class="system-title">
            SGA ACADÉMICO
        </div>

        <div class="subtitle">
            Usa tu usuario institucional o DNI
        </div>

        <div class="login-title">
            Iniciar sesión
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="field">

                <label>Usuario</label>

                <div class="input-box">

                    <span class="icon">
                        <i class="fa-solid fa-user"></i>
                    </span>

                    <input
                    type="text"
                    name="username"
                    placeholder="Ingrese su usuario">

                </div>

            </div>

            <div class="field">

                <label>Contraseña</label>

                <div class="input-box">

                    <span class="icon">
                        <i class="fa-solid fa-lock"></i>
                    </span>

                    <input
                    id="password"
                    type="password"
                    name="password"
                    placeholder="Ingrese su contraseña">

                    <button
                    type="button"
                    class="eye-btn"
                    onclick="togglePassword()">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

            </div>

            <div class="options">

                <label class="remember">
                    <input type="checkbox">
                    Recordarme
                </label>

                <a href="#" class="forgot">
                    ¿Olvidaste tu contraseña?
                </a>

            </div>

            <button class="btn-login" type="submit">
                <i class="fa-solid fa-right-to-bracket"></i>
                Ingresar
            </button>

            <button class="btn-web" type="button">
                <i class="fa-solid fa-globe"></i>
                Página Web
            </button>

        </form>

        <div class="line"></div>

        <div class="footer">
            SGA ACADÉMICO © 2026
        </div>

    </div>

</div>

<script>

function togglePassword(){

    const password =
    document.getElementById("password");

    const icon =
    document.querySelector(".eye-btn i");

    if(password.type === "password"){

        password.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");

    }else{

        password.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");

    }

}

</script>

</body>
</html>
