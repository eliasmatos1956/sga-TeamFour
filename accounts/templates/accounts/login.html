<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login SGA</title>
</head>
<body>

    <h1>Login Sistema SGA</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Usuario:</label>
        <input type="text" name="username">

        <br><br>

        <label>Contraseña:</label>
        <input type="password" name="password">

        <br><br>

        <button type="submit">Ingresar</button>
    </form>

</body>
</html>
